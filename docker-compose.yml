version: "3.8"

services:
  bot:
    build: .
    container_name: telegram-bot
    restart: unless-stopped
    ports:
      - "10000:10000"
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env
    environment:
      - TZ=Asia/Shanghai
    mem_limit: 500m
    memswap_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
